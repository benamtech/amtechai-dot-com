[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Node 24 is required so the OKF/prerender build scripts (.ts run directly via type stripping)
# work in CI. The `postbuild` step prerenders article + hub routes into dist/ for crawlers/agents.
[build.environment]
  NODE_VERSION = "24"

# Serve prerendered <route>/index.html directly at the clean, no-trailing-slash URL.
# Without this, Netlify 301-redirects /skills/okf-audit -> /skills/okf-audit/ before serving,
# which (a) gives redirect-averse agents/crawlers an empty 301 body and (b) fights our
# no-slash <link rel="canonical">. pretty_urls=false removes the hop; the page serves 200 directly.
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

[[redirects]]
  from = "/claim/start-from-sms"
  to = "/.netlify/functions/claim/start-from-sms"
  status = 200

[[redirects]]
  from = "/claim/send-code"
  to = "/.netlify/functions/claim/send-code"
  status = 200

[[redirects]]
  from = "/claim/verify-code"
  to = "/.netlify/functions/claim/verify-code"
  status = 200

[[redirects]]
  from = "/claim/verify-and-claim"
  to = "/.netlify/functions/claim/verify-and-claim"
  status = 200

[[redirects]]
  from = "/sms-entry"
  to = "/.netlify/functions/sms-entry"
  status = 200
